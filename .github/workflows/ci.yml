name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  verify:
    runs-on: ubuntu-latest

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 #v7.0.1
        with:
          fetch-depth: 0

      - name: Detect Java version from Maven POM
        id: java
        shell: bash
        run: |
          set -euo pipefail

          RAW=$(mvn -q -N -DforceStdout help:evaluate -Dexpression=maven.compiler.target 2>/dev/null \
            | tr -d '\r' \
            | awk 'NF{last=$0} END{print last}')

          MAJOR="${RAW%%.*}"

          if [[ ! "$MAJOR" =~ ^[0-9]+$ ]]; then
            echo "Could not determine Java version from maven.compiler.target (got '$RAW')" >&2
            exit 1
          fi

          echo "Detected Java version from maven.compiler.target: $MAJOR"
          echo "version=$MAJOR" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: ${{ steps.java.outputs.version }}
          cache: maven

      - name: Maven Verify
        run: mvn -B -Pci clean verify

      - name: Cache SonarCloud packages
        if: ${{ env.SONAR_TOKEN }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarCloud analysis (only when token available)
        if: ${{ env.SONAR_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        run: |
          mvn -B -Pci \
            org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=voomdoon_vd-util-parent
