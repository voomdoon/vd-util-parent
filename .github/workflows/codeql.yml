---
name: CodeQL Advanced

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '31 18 * * 1'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read
      actions: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none

          - language: java-kotlin
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  #  v7.0.0

      - name: Detect Java sources
        id: detect
        shell: bash
        run: |
          if git ls-files -- '**/*.java' | grep -q .; then
            echo "has_java=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_java=false" >> "$GITHUB_OUTPUT"
          fi

      #  Only needed for Java/Kotlin
      - name: Set up JDK 21
        if: >
          matrix.language == 'java-kotlin' &&
          steps.detect.outputs.has_java == 'true'
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  #  v5.6.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Initialize CodeQL
        if: >
          matrix.language != 'java-kotlin' ||
          steps.detect.outputs.has_java == 'true'
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  #  v4.37.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      #  Manual build for Java/Kotlin so CodeQL can extract + compile with Java 21
      - name: Build with Maven
        if: >
          matrix.language == 'java-kotlin' &&
          steps.detect.outputs.has_java == 'true'
        run: mvn -B -DskipTests package

      - name: Perform CodeQL Analysis
        if: >
          matrix.language != 'java-kotlin' ||
          steps.detect.outputs.has_java == 'true'
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a  #  v4.37.1
        with:
          category: "/language:${{ matrix.language }}"
