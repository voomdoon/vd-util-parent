name: Retry failed Dependabot auto-merge

on:
  workflow_run:
    workflows: ["Dependabot auto-merge"]
    types: [completed]

permissions:
  actions: write
  contents: read

concurrency:
  group: retry-dependabot-automerge-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  retry:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]' &&
      github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-minimal

    steps:
      - name: Delay on final retry
        if: github.event.workflow_run.run_attempt == 2
        shell: bash
        run: |
          delay=$((30 + RANDOM % 31))
          echo "Final retry: sleeping ${delay}s"
          sleep "$delay"

      - name: Re-run workflow
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/actions/runs/$RUN_ID/rerun"
